<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Better Half</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-pink: #ff4d6d;
            --deep-rose: #c9184a;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%);
            overflow: hidden;
            text-align: center;
        }

        /* Animated Heart Rain */
        .heart {
            position: fixed;
            top: -10%;
            user-select: none;
            z-index: 0;
            animation: fall linear forwards;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.3));
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        /* Glassmorphism Card with Float Animation */
        .card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.4);
            max-width: 450px;
            width: 85%;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        .hidden {
            display: none !important;
            opacity: 0;
        }

        h1 { 
            font-family: 'Dancing Script', cursive;
            color: white; 
            font-size: 2.8rem; 
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        p { color: white; font-size: 1.3rem; margin-bottom: 30px; }
        .bold-text { font-weight: bold; font-size: 3rem; color: #fff; }

        .btn-group { display: flex; gap: 20px; justify-content: center; }

        button {
            padding: 15px 35px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.3s all;
        }

        .btn-yes { background: white; color: var(--primary-pink); }
        .btn-no { background: transparent; color: white; border: 2px solid white; }
        button:hover { transform: scale(1.1); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .btn-yes:hover { background: var(--primary-pink); color: white; }
    </style>
</head>
<body>

    <audio id="romanticSong" loop>
      <source src="music1.mp3" type="audio/mpeg">
    </audio>

    <div id="content">
        <div id="step1" class="card">
            <h1>Greeting for my better half</h1>
            <p>Do you wanna be my heartbeat of my life?</p>
            <div class="btn-group">
                <button class="btn-yes" onclick="show('step2')">Yes</button>
                <button class="btn-no" onclick="show('april')">No</button>
            </div>
        </div>

        <div id="step2" class="card hidden">
            <h1>Are you sure?</h1>
            <div class="btn-group">
                <button class="btn-yes" onclick="show('selected')">Yes!</button>
                <button class="btn-no" onclick="show('april')">No</button>
            </div>
        </div>

        <div id="selected" class="card hidden">
            <h1 class="bold-text">Selected! 💖</h1>
            <p>I knew you'd say yes!</p>
        </div>

        <div id="april" class="card hidden">
            <h1 class="bold-text">April Fool😘</h1>
            <p style="font-weight: bold;">you have to do...🤪</p>
        </div>
    </div>

    <script>
        const song = document.getElementById('romanticSong');

        function show(id) {
            // Start the music on the first click!
            if (song.paused) {
                song.play().catch(e => console.log("Audio waiting for more interaction"));
            }

            const current = document.querySelector('.card:not(.hidden)');
            current.style.opacity = '0';
            
            setTimeout(() => {
                current.classList.add('hidden');
                const next = document.getElementById(id);
                next.classList.remove('hidden');
                setTimeout(() => {
                    next.style.opacity = '1';
                }, 50);
            }, 500);
        }

        // Heart Rain Logic
        function rain() {
            const colors = ['#ff4d6d', '#ff758f', '#ff8fa3', '#ffffff', '#ffb3c1'];
            const h = document.createElement('div');
            h.classList.add('heart');
            h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.color = colors[Math.floor(Math.random() * colors.length)];
            h.style.fontSize = (Math.random() * 20 + 15) + 'px';
            h.style.animationDuration = (Math.random() * 3 + 3) + 's';
            h.style.opacity = Math.random() * 0.8 + 0.2;
            
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 6000);
        }
        setInterval(rain, 250);
    </script>
</body>
</html>
